# Railway service config for Laravel + Vite assets

[build]
builder = "NIXPACKS"
buildCommand = "npm install --no-audit --no-fund && npm run build && composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev && chmod +x scripts/railway-start.sh"

[deploy]
startCommand = "bash scripts/railway-start.sh"
restartPolicyType = "ON_FAILURE"
